<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Swarm Simulation — owockibot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#e5e5e5; font-family:'Space Mono',monospace; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

  header { padding:9px 18px; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; background:#050505; }
  .brand { font-size:12px; color:#f5c518; font-weight:700; letter-spacing:.12em; }
  .brand a { color:#444; text-decoration:none; font-size:9px; margin-left:10px; letter-spacing:.06em; transition:color .15s; }
  .brand a:hover { color:#f5c518; }

  .controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn { padding:4px 12px; border-radius:2px; border:1px solid #2a2a2a; background:#0d0d0d; color:#888; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; letter-spacing:.08em; transition:all .15s; }
  .btn:hover { border-color:#f5c518; color:#f5c518; }
  .btn.active { background:#f5c518; color:#0a0a0a; border-color:#f5c518; font-weight:700; }
  label { font-size:10px; color:#444; display:flex; align-items:center; gap:5px; letter-spacing:.06em; }
  input[type=range] { width:65px; accent-color:#f5c518; cursor:pointer; }
  select { background:#0d0d0d; border:1px solid #2a2a2a; color:#888; padding:3px 7px; font-family:'Space Mono',monospace; font-size:10px; border-radius:2px; cursor:pointer; }
  select:focus, select:hover { border-color:#f5c518; outline:none; color:#f5c518; }

  .stats-bar { display:flex; gap:20px; padding:5px 18px; border-bottom:1px solid #111; background:#030303; flex-shrink:0; }
  .stat .val { color:#f5c518; font-weight:700; font-size:13px; font-family:'Space Mono',monospace; }
  .stat .lbl { color:#333; font-size:9px; margin-left:4px; letter-spacing:.1em; }
  .stat.critical .val { color:#fb4444; }

  canvas { flex:1; display:block; cursor:pointer; }

  #log { position:fixed; bottom:0; right:0; width:280px; max-height:175px; background:rgba(3,3,3,.96); border-left:1px solid rgba(245,197,24,.12); border-top:1px solid rgba(245,197,24,.12); overflow-y:auto; padding:8px; pointer-events:none; }
  .log-hdr { font-size:9px; color:#f5c518; letter-spacing:.15em; margin-bottom:5px; opacity:.7; border-bottom:1px solid rgba(245,197,24,.08); padding-bottom:4px; }
  .le { font-size:10px; padding:1.5px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'Space Mono',monospace; }
  .le .ts { color:#333; }
  .le .msg { color:#555; }
  .le.task .msg { color:#f5c518; }
  .le.done .msg { color:#4ade80; }
  .le.crit .msg { color:#fb4444; }

  #legend { position:fixed; top:76px; left:12px; background:rgba(3,3,3,.94); border:1px solid #1a1a1a; padding:8px 12px; font-size:10px; z-index:10; max-height:calc(100vh - 120px); overflow-y:auto; }
  .legend-item { display:flex; align-items:center; gap:7px; margin-bottom:5px; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.06em; color:#555; }
  .legend-diamond { width:9px; height:9px; transform:rotate(45deg); flex-shrink:0; }

  /* tap-to-pause hint on mobile */
  #tap-hint { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:11px; color:rgba(245,197,24,.5); letter-spacing:.1em; pointer-events:none; font-family:'Space Mono',monospace; }
  #tap-hint.show { display:block; }

  /* ── Mobile ── */
  @media (max-width:640px) {
    body { overflow-y:auto !important; height:auto !important; display:block !important; }

    header { flex-direction:column; align-items:flex-start; gap:6px; padding:8px 12px; }
    .brand { font-size:11px; }
    .brand a { display:none; }

    .controls { gap:6px; width:100%; flex-wrap:nowrap; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; }
    .controls::-webkit-scrollbar { display:none; }
    .btn { padding:7px 14px; font-size:12px; flex-shrink:0; min-height:36px; }
    label { font-size:9px; flex-shrink:0; white-space:nowrap; }
    input[type=range] { width:55px; min-height:36px; }
    label:last-child { display:none; }

    .stats-bar { gap:12px; padding:6px 12px; overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch; }
    .stat { white-space:nowrap; }
    .stat .val { font-size:12px; }
    .stat .lbl { font-size:8px; }

    #canvas-wrap { position:relative; width:100%; }
    canvas { display:block; width:100% !important; height:58vw !important; min-height:210px; max-height:320px; }

    #legend { display:none !important; }

    #log {
      position:static !important;
      display:block; width:100%; max-height:200px;
      border-left:none; border-right:none;
      border-top:1px solid rgba(245,197,24,.15);
      pointer-events:auto;
    }
    .le { font-size:9px; }
    #tap-hint { display:none !important; } /* handled by JS */
  }
</style>
</head>
<body>
<header>
  <div class="brand">🌊 AGENT SWARM SIM <a href="https://www.owockibot.xyz" target="_blank">owockibot.xyz</a> · bioregional coordination</div>
  <div class="controls">
    <button class="btn active" id="btnPlay">⏸ PAUSE</button>
    <button class="btn" id="btnReset">↺ RESET</button>
    <label>AGENTS <input type="range" id="sAgents" min="4" max="18" value="8"> <span id="agentCount">8</span></label>
    <label>SPEED <input type="range" id="sSpeed" min="1" max="4" value="2"> <span id="speedVal">2×</span></label>
    <label>GOAL <select id="goalSel">
      <option>MAP BIOREGION</option>
      <option>DISTRIBUTE BOUNTIES</option>
      <option>CONSENSUS VOTE</option>
      <option>DATA HARVEST</option>
    </select></label>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="val" id="sA">8</span><span class="lbl">AGENTS</span></div>
  <div class="stat"><span class="val" id="sM">0</span><span class="lbl">MESSAGES</span></div>
  <div class="stat"><span class="val" id="sT">0</span><span class="lbl">TASKS DONE</span></div>
  <div class="stat" id="statCons"><span class="val" id="sC">0%</span><span class="lbl">CONSENSUS</span></div>
  <div class="stat"><span class="val" id="sP">INIT</span><span class="lbl">PHASE</span></div>
</div>

<div id="canvas-wrap" style="position:relative;flex:1;display:flex;flex-direction:column;">
  <canvas id="c"></canvas>
  <div id="tap-hint">TAP TO PAUSE</div>
</div>

<div id="legend">
  <div style="font-size:9px;color:#333;letter-spacing:.12em;margin-bottom:7px;font-family:'Space Mono',monospace">AGENT ROLES</div>
</div>

<div id="log">
  <div class="log-hdr">// COORDINATION LOG</div>
  <div id="logEl"></div>
</div>

<script>
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let W, H, agents=[], parts=[], pulseLines=[], run=true, tick=0, speed=2, N=8;
let totM=0, totT=0, phase=0, phTick=0, goal='MAP BIOREGION';
let lastConsensus=0, consensusStall=0, celebTick=0;
const isMobile = () => window.innerWidth <= 640;

const ROLES  = ['COORDINATOR','SCOUT','ANALYST','RELAY','VALIDATOR','HARVESTER'];
const COLORS = {
  COORDINATOR:'#f5c518', SCOUT:'#60a5fa', ANALYST:'#a78bfa',
  RELAY:'#34d399', VALIDATOR:'#fb7185', HARVESTER:'#fb923c'
};
const PHASES = ['DISCOVERY','NEGOTIATION','ALLOCATION','EXECUTION','CONSENSUS','COMMIT'];
const PHASE_T = 250;
let logs = [];

// Build legend
const lg = document.getElementById('legend');
ROLES.forEach(r => {
  const d = document.createElement('div'); d.className='legend-item';
  const diamond = document.createElement('div'); diamond.className='legend-diamond';
  diamond.style.background = COLORS[r];
  diamond.style.boxShadow = `0 0 4px ${COLORS[r]}55`;
  const txt = document.createElement('span'); txt.textContent = r;
  d.appendChild(diamond); d.appendChild(txt); lg.appendChild(d);
});

function resize(){
  // Use explicit CSS dimensions on mobile so canvas fills correctly
  if(isMobile()){
    const wrap = document.getElementById('canvas-wrap');
    W = cv.width = wrap.offsetWidth || window.innerWidth;
    // Read CSS-computed height
    const cssH = parseInt(getComputedStyle(cv).height) || Math.round(window.innerWidth * 0.58);
    H = cv.height = Math.max(cssH, 210);
  } else {
    W = cv.width  = cv.offsetWidth;
    H = cv.height = cv.offsetHeight;
  }
  // Re-scatter agents on resize so they're within new bounds
  if(agents.length){
    agents.forEach(a => {
      a.x = Math.min(Math.max(a.x, W*.1), W*.9);
      a.y = Math.min(Math.max(a.y, H*.1), H*.9);
    });
  }
}

// ── Pulse line ─────────────────────────────────────────────────────────────
class PulseLine {
  constructor(a,b,color){ this.a=a; this.b=b; this.c=color; this.t=0; this.life=1; }
  update(){ this.t+=.04*speed; this.life=Math.max(0,1-this.t*.6); return this.life>0; }
  draw(){
    cx.beginPath(); cx.moveTo(this.a.x,this.a.y); cx.lineTo(this.b.x,this.b.y);
    cx.strokeStyle=`rgba(${rgb(this.c)},${this.life*.55})`;
    cx.lineWidth=1+this.life*1.5; cx.stroke();
  }
}

// ── Agent ─────────────────────────────────────────────────────────────────
class Agent {
  constructor(id){
    this.id=id;
    this.x=Math.random()*W*.7+W*.15; this.y=Math.random()*H*.6+H*.2;
    this.vx=(Math.random()-.5)*.6; this.vy=(Math.random()-.5)*.6;
    this.role=ROLES[id%ROLES.length]; this.c=COLORS[this.role];
    this.busy=false; this.prog=0; this.task=''; this.state='IDLE';
    this.pulse=0; this.glowPulse=0; this.cool=0;
    this.lbl=`A${String(id+1).padStart(2,'0')}`;
    this.size=this.role==='COORDINATOR'?16:10;
  }

  update(){
    // Dynamic margins — 10% of canvas
    const mx=W*.1, my=H*.1;
    this.x+=this.vx*speed*.25; this.y+=this.vy*speed*.25;
    if(this.x<mx)   this.vx+=.07; if(this.x>W-mx) this.vx-=.07;
    if(this.y<my)   this.vy+=.07; if(this.y>H-my) this.vy-=.07;
    agents.forEach(b=>{ if(b===this)return; const dx=this.x-b.x,dy=this.y-b.y,d=Math.sqrt(dx*dx+dy*dy); if(d<100&&d>0){this.vx+=dx/d*.04;this.vy+=dy/d*.04;} });
    this.vx*=.97; this.vy*=.97;
    if(this.pulse>0) this.pulse-=.9;
    if(this.glowPulse>0) this.glowPulse-=.5;
    if(this.cool>0) this.cool--;
    if(this.busy){
      this.prog+=.0018*speed;
      if(this.prog>=1){
        this.prog=0; this.busy=false; this.state='DONE'; this.task=''; totT++;
        document.getElementById('sT').textContent=totT;
        this.pulse=40; this.glowPulse=40;
        addLog(`${this.lbl} ✓ task complete`,'done');
        agents.filter(b=>b!==this).slice(0,3).forEach(b=>pulseLines.push(new PulseLine(this,b,this.c)));
        setTimeout(()=>{this.state='IDLE';},1800);
      }
    }
  }

  draw(){
    const s=this.size;
    // COORDINATOR: extra outer ring always visible
    if(this.role==='COORDINATOR'){
      cx.save(); cx.translate(this.x,this.y); cx.rotate(Math.PI/4+tick*.004);
      cx.beginPath(); cx.rect(-(s+8),-(s+8),(s+8)*2,(s+8)*2);
      cx.strokeStyle=`rgba(245,197,24,${.1+.05*Math.sin(tick*.05)})`; cx.lineWidth=1; cx.stroke();
      cx.restore();
    }
    // Glow halo on completion
    if(this.glowPulse>0){
      const glow=this.glowPulse/40;
      cx.save(); cx.translate(this.x,this.y); cx.rotate(Math.PI/4);
      const gs=(s+12)*glow;
      cx.beginPath(); cx.rect(-gs,-gs,gs*2,gs*2);
      cx.fillStyle=`rgba(${rgb(this.c)},${glow*.25})`; cx.fill(); cx.restore();
    }
    // Pulse ring
    if(this.pulse>0){
      const pr=this.pulse/40;
      cx.save(); cx.translate(this.x,this.y); cx.rotate(Math.PI/4);
      const ps=s+this.pulse*.7;
      cx.beginPath(); cx.rect(-ps,-ps,ps*2,ps*2);
      cx.strokeStyle=`rgba(${rgb(this.c)},${pr*.4})`; cx.lineWidth=1.5; cx.stroke(); cx.restore();
    }
    // Task progress arc
    if(this.busy){
      const a=(tick*.025*speed)%(Math.PI*2);
      cx.beginPath(); cx.arc(this.x,this.y,s*Math.sqrt(2)+6,a,a+Math.PI*1.4);
      cx.strokeStyle=this.c; cx.lineWidth=1.5; cx.stroke();
      cx.beginPath(); cx.arc(this.x,this.y,s*Math.sqrt(2)+6,-Math.PI/2,-Math.PI/2+Math.PI*2*this.prog);
      cx.strokeStyle='rgba(255,255,255,.6)'; cx.lineWidth=1; cx.stroke();
    }
    // Main diamond
    cx.save(); cx.translate(this.x,this.y); cx.rotate(Math.PI/4);
    const grad=cx.createLinearGradient(-s,-s,s,s);
    grad.addColorStop(0,this.state==='DONE'?'#ffffff':lighten(this.c,.25));
    grad.addColorStop(1,`rgba(${rgb(this.c)},.2)`);
    cx.beginPath(); cx.rect(-s,-s,s*2,s*2);
    cx.fillStyle=grad; cx.fill();
    cx.strokeStyle=this.state==='DONE'?'#4ade80':`rgba(${rgb(this.c)},.8)`;
    cx.lineWidth=this.role==='COORDINATOR'?2.5:1.5; cx.stroke();
    cx.restore();
    // Label
    cx.fillStyle='#0a0a0a'; cx.font=`bold ${s>12?9:7}px 'Space Mono',monospace`;
    cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(this.lbl,this.x,this.y);
    // Role — skip on very small canvas (mobile)
    if(H>220){
      cx.fillStyle=this.c+'bb'; cx.font=`7px 'Space Mono',monospace`;
      cx.fillText(this.role.slice(0,4),this.x,this.y+s*Math.sqrt(2)+10);
    }
    if(this.task&&this.busy&&H>220){
      cx.fillStyle='rgba(245,197,24,.6)'; cx.font=`8px 'Space Mono',monospace`;
      cx.fillText(`[${this.task}]`,this.x,this.y-s*Math.sqrt(2)-9);
    }
  }
}

// ── Particle ───────────────────────────────────────────────────────────────
class Particle {
  constructor(a,b,data){
    this.a=a; this.b=b; this.t=0; this.data=data; this.c=a.c;
    this.sp=.007*speed+Math.random()*.003;
    totM++; document.getElementById('sM').textContent=totM;
  }
  update(){ this.t+=this.sp*speed; return this.t<1; }
  draw(){
    const ease=t=>t<.5?2*t*t:-1+(4-2*t)*t;
    const x=lerp(this.a.x,this.b.x,ease(this.t)), y=lerp(this.a.y,this.b.y,ease(this.t));
    for(let i=0;i<4;i++){
      const tt=Math.max(0,this.t-i*.04);
      cx.beginPath(); cx.arc(lerp(this.a.x,this.b.x,ease(tt)),lerp(this.a.y,this.b.y,ease(tt)),2.5-i*.4,0,Math.PI*2);
      cx.fillStyle=`rgba(${rgb(this.c)},${(4-i)*.09})`; cx.fill();
    }
    cx.save(); cx.translate(x,y); cx.rotate(Math.PI/4);
    cx.beginPath(); cx.rect(-3.5,-3.5,7,7);
    cx.fillStyle=this.c; cx.fill(); cx.restore();
    if(this.data&&this.t>.2&&this.t<.8&&H>220){
      cx.fillStyle='rgba(245,197,24,.5)'; cx.font=`7px 'Space Mono',monospace`;
      cx.textAlign='center'; cx.fillText(this.data,x,y-9);
    }
  }
}

function lerp(a,b,t){ return a+(b-a)*t; }
function rgb(h){ return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
function lighten(hex,f){ return '#'+[1,3,5].map(i=>Math.min(255,parseInt(hex.slice(i,i+2),16)+Math.round(f*255)).toString(16).padStart(2,'0')).join(''); }

function send(a,b,d){
  if(!a||!b||a===b) return;
  parts.push(new Particle(a,b,d)); a.pulse=12;
  if(a.cool<=0){ addLog(`${a.lbl}→${b.lbl}: ${d}`); a.cool=50; }
}

function assignTask(ag){
  const t={MAP:['SAMPLE','SURVEY','MAP','SCAN'],DIST:['VERIFY','ALLOC','PAY','ROUTE'],CONS:['PROPOSE','VOTE','TALLY','RATIFY'],DATA:['COLLECT','CLEAN','INDEX','STORE']};
  const k=goal.split(' ')[0].slice(0,4);
  ag.task=(t[k]||t.MAP)[Math.floor(Math.random()*(t[k]||t.MAP).length)];
  ag.busy=true; ag.state='WORKING'; ag.prog=0;
  addLog(`${ag.lbl} assigned: ${ag.task}`,'task');
}

function addLog(msg,cls=''){
  const now=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logs.unshift({msg,cls,now}); if(logs.length>40) logs.pop();
  document.getElementById('logEl').innerHTML=logs.map(l=>
    `<div class="le ${l.cls}"><span class="ts">[${l.now}]</span> <span class="msg">${l.msg}</span></div>`
  ).join('');
}

function logic(){
  phTick++;
  if(phTick>PHASE_T/speed){
    phTick=0; phase=(phase+1)%PHASES.length;
    document.getElementById('sP').textContent=PHASES[phase];
    addLog(`── ${PHASES[phase]} ──`,'task');
    if(PHASES[phase]==='CONSENSUS')
      agents.forEach((a,i)=>agents.slice(i+1).forEach(b=>pulseLines.push(new PulseLine(a,b,'#f5c518'))));
    if(PHASES[phase]==='COMMIT') celebTick=60;
  }
  if(tick%Math.max(1,Math.floor(35/speed))===0){
    const a=agents[Math.floor(Math.random()*agents.length)],b=agents[Math.floor(Math.random()*agents.length)];
    const m={DISCOVERY:['PING','FOUND?','SCAN?'],NEGOTIATION:['OFFER','ACCEPT?','BID'],ALLOCATION:['TASK?','ASSIGN','ACK'],EXECUTION:['STATUS?','WORKING','WAIT'],CONSENSUS:['VOTE:Y','VOTE:N','AGREE?'],COMMIT:['COMMIT','SYNC','DONE']};
    send(a,b,(m[PHASES[phase]]||['MSG'])[Math.floor(Math.random()*(m[PHASES[phase]]||['MSG']).length)]);
  }
  const coord=agents.find(a=>a.role==='COORDINATOR');
  if(coord&&tick%Math.max(1,Math.floor(70/speed))===0){
    const t=agents[Math.floor(Math.random()*agents.length)];
    if(t!==coord) send(coord,t,goal.split(' ')[0]);
  }
  if(tick%Math.max(1,Math.floor(110/speed))===0){
    const idle=agents.filter(a=>!a.busy&&a.state==='IDLE');
    if(idle.length) assignTask(idle[Math.floor(Math.random()*idle.length)]);
  }
  const busy=agents.filter(a=>a.busy).length;
  const cons=Math.round(totT/Math.max(1,totT+busy)*100);
  document.getElementById('sC').textContent=Math.min(cons,99)+'%';
  const statCons=document.getElementById('statCons');
  if(cons<20&&tick>300){ consensusStall++; statCons.classList.add('critical'); if(consensusStall%200===0) addLog(`⚠ CONSENSUS STALL — ${cons}%`,'crit'); }
  else { consensusStall=0; statCons.classList.remove('critical'); }
}

function frame(){
  cx.clearRect(0,0,W,H); cx.fillStyle='#0a0a0a'; cx.fillRect(0,0,W,H);
  if(run){
    for(let s=0;s<speed-1;s++){agents.forEach(a=>a.update());logic();}
    agents.forEach(a=>a.update()); logic(); tick++;
    parts=parts.filter(p=>p.update());
    pulseLines=pulseLines.filter(p=>p.update());
    if(celebTick>0){ celebTick--; }
  }
  // Grid
  cx.strokeStyle='rgba(255,255,255,.015)'; cx.lineWidth=1;
  for(let x=0;x<W;x+=45){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=45){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  cx.fillStyle='rgba(245,197,24,.022)';
  for(let x=45;x<W;x+=45)for(let y=45;y<H;y+=45){cx.beginPath();cx.arc(x,y,1,0,Math.PI*2);cx.fill();}
  // Commit celebration flash
  if(celebTick>0){
    cx.fillStyle=`rgba(245,197,24,${celebTick/60*.06})`;
    cx.fillRect(0,0,W,H);
  }
  // Goal watermark
  const wSize=Math.min(60,W/10);
  cx.font=`bold ${wSize}px 'Space Mono',monospace`; cx.fillStyle='rgba(245,197,24,.025)';
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(goal,W/2,H/2);
  // Edges
  agents.forEach((a,i)=>agents.slice(i+1).forEach(b=>{
    const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<200){cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.strokeStyle=`rgba(60,60,60,${(1-d/200)*.1})`;cx.lineWidth=1;cx.stroke();}
  }));
  pulseLines.forEach(p=>p.draw());
  parts.forEach(p=>p.draw());
  agents.forEach(a=>a.draw());
  requestAnimationFrame(frame);
}

function init(n){
  agents=Array.from({length:n},(_,i)=>new Agent(i));
  parts=[]; pulseLines=[]; tick=0; phase=0; phTick=0; consensusStall=0; celebTick=0;
}

function togglePause(){
  run=!run;
  const btn=document.getElementById('btnPlay');
  btn.textContent=run?'⏸ PAUSE':'▶ PLAY'; btn.classList.toggle('active',run);
}

// Controls
document.getElementById('btnPlay').addEventListener('click',togglePause);
document.getElementById('btnReset').addEventListener('click',()=>{
  totM=0; totT=0; logs=[];
  ['sM','sT'].forEach(id=>document.getElementById(id).textContent=0);
  document.getElementById('sC').textContent='0%';
  document.getElementById('sP').textContent='INIT';
  document.getElementById('logEl').innerHTML='';
  document.getElementById('statCons').classList.remove('critical');
  init(N); addLog('=== SWARM INITIALIZED ===','task');
});
document.getElementById('sAgents').addEventListener('input',function(){
  N=+this.value; document.getElementById('agentCount').textContent=N;
  document.getElementById('sA').textContent=N; init(N);
});
document.getElementById('sSpeed').addEventListener('input',function(){
  speed=+this.value; document.getElementById('speedVal').textContent=speed+'×';
});
document.getElementById('goalSel').addEventListener('change',function(){
  goal=this.value; addLog(`=== NEW GOAL: ${goal} ===`,'task');
});

// Tap canvas to pause (mobile-friendly)
cv.addEventListener('click', togglePause);
cv.addEventListener('touchend', e=>{ e.preventDefault(); togglePause(); }, {passive:false});

// Resize + orientation
function onResize(){ resize(); }
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=>{ setTimeout(onResize, 150); });

// Wait for fonts before starting
document.fonts.ready.then(()=>{
  resize(); init(N);
  addLog('=== SWARM INITIALIZED ===','task');
  addLog(`GOAL: ${goal}`,'task');
  frame();
});
</script>
</body>
</html>
